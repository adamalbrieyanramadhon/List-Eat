<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Restaurant Wishlist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍴 Wishlist Kulinerku</h1>
        </header>

        <section class="input-section">
            <input type="text" id="restoName" placeholder="Nama Restoran...">
            <select id="restoCategory">
                <option value="Semua">-- Pilih Kategori --</option>
                <option value="Seafood">Seafood</option>
                <option value="Ayam">Ayam</option>
                <option value="Daging">Daging/Steak</option>
                <option value="Kopi">Kopi/Cafe</option>
            </select>
            <input type="text" id="restoMaps" placeholder="Link Google Maps (Optional)">
            <button onclick="addResto()">Tambah ke List</button>
        </section>

        <div class="filter-group">
            <button onclick="filterResto('Semua')">Semua</button>
            <button onclick="filterResto('Seafood')">Seafood</button>
            <button onclick="filterResto('Ayam')">Ayam</button>
        </div>

        <ul id="wishlist">
            </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
