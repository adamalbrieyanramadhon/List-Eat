<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Restaurant Wishlist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍴 Wishlist Kulinerku</h1>
            <p>Daftar tempat makan yang wajib dicoba!</p>
        </header>

        <section class="input-section">
            <input type="text" id="restoName" placeholder="Nama Restoran...">
            <input type="text" id="restoLocation" placeholder="Lokasi (contoh: Jakarta Selatan)">
            <button onclick="addResto()">Tambah ke List</button>
        </section>

        <ul id="wishlist">
            <li>
                <div>
                    <strong>Sate Khas Senayan</strong> — Jakarta
                </div>
                <button class="delete-btn" onclick="this.parentElement.remove()">Hapus</button>
            </li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
