<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempat Mam - Culinary Wishlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h3>Tambah Wishlist Makan</h3>
            <button class="close-modal" onclick="toggleModal()">&times;</button>
            <div class="input-form">
                <input type="text" id="restoName" placeholder="Nama Restoran/Tempat...">
                <select id="restoCategory">
                    <option value="">Pilih Kategori</option>
                    <option value="Sushi">Sushi</option>
                    <option value="Thailand">Thailand</option>
                    <option value="Street Food">Street Food</option>
                    <option value="Daging/Meat">Daging/Meat</option>
                    <option value="Coffee Shop">Coffee Shop</option>
                </select>
                <input type="text" id="restoMaps" placeholder="Link Google Maps (Opsional)">
                <button id="addBtn">Simpan ke List</button>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <header class="header">
            <h1 class="title">Tempat Mam</h1>
            <div class="divider"></div>
        </header>

        <nav class="nav-filters">
            <div class="filter-row">
                <button onclick="filterData('all')" class="btn-filter active">Semua</button>
                <button onclick="filterData('Sushi')" class="btn-filter">Sushi</button>
                <button onclick="filterData('Thailand')" class="btn-filter">Thailand</button>
                <button onclick="filterData('Street Food')" class="btn-filter">Street Food</button>
                <button onclick="filterData('Daging/Meat')" class="btn-filter">Daging</button>
                <button onclick="filterData('Coffee Shop')" class="btn-filter">Coffee</button>
            </div>
        </nav>

        <div id="wishlist" class="grid-container">
            </div>
    </div>

    <button class="add-button" onclick="toggleModal()">
        <span>+</span>
    </button>

    <script src="script.js"></script>
</body>
</html>
