<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Culinary Wishlist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍴 Wishlist Kulinerku</h1>
        </header>

        <section class="input-section">
            <input type="text" id="restoName" placeholder="Nama Tempat/Resto...">
            
            <div class="row">
                <select id="restoCategory">
                    <option value="">-- Pilih Kategori --</option>
                    <option value="Coffee Shop">Coffee Shop</option>
                    <option value="Seafood">Seafood</option>
                    <option value="Ayam">Ayam</option>
                    <option value="Daging">Daging/Steak</option>
                    <option value="Snack/Dessert">Snack/Dessert</option>
                </select>

                <select id="restoPrice">
                    <option value="L">L (Low/Murah)</option>
                    <option value="H">H (High/Mahal)</option>
                </select>
            </div>

            <input type="text" id="restoMaps" placeholder="Link Google Maps">
            <button id="addBtn">Tambah ke List</button>
        </section>

        <div class="filter-section">
            <p>Filter Kategori:</p>
            <div class="filter-group scrollable">
                <button onclick="filterData('all', 'category')">Semua</button>
                <button onclick="filterData('Coffee Shop', 'category')">☕ Coffee</button>
                <button onclick="filterData('Seafood', 'category')">🐟 Seafood</button>
                <button onclick="filterData('Ayam', 'category')">🍗 Ayam</button>
                <button onclick="filterData('Snack/Dessert', 'category')">🍰 Snack</button>
            </div>
            
            <p>Filter Harga:</p>
            <div class="filter-group">
                <button class="btn-h" onclick="filterData('H', 'price')">💰 Mahal (H)</button>
                <button class="btn-l" onclick="filterData('L', 'price')">💸 Murah (L)</button>
            </div>
        </div>

        <ul id="wishlist"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
